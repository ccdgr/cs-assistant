# 408 考研择校助手 后端配置 (示例)
# 复制为 config.yaml 并填写实际值

server:
  addr: ":8080"
  mode: "dev" # dev | prod

mysql:
  host: "127.0.0.1"
  port: 3306
  user: "root"
  password: "your_mysql_password"
  database: "cs_assistant"
  max_idle_conns: 10
  max_open_conns: 100
  conn_max_lifetime: 3600 # 秒

redis:
  addr: "127.0.0.1:6379"
  password: ""
  db: 0
  pool_size: 10

llm:
  api_url: "https://api.deepseek.com/v1/chat/completions"
  api_key: "your_llm_api_key"
  model: "deepseek-chat"
  max_loops: 3 # Agent ReAct 最大循环次数
  temperature: 0.3
  timeout: 60 # 秒

wechat:
  app_id: "your_wechat_app_id"
  app_secret: "your_wechat_app_secret"

log:
  level: "debug" # debug | info | warn | error
  format: "text" # text | json
  add_source: true # 是否打印调用位置
